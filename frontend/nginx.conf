server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # --- Reverse Proxy: API & Auth ---
    # Must come BEFORE the SPA catch-all
    location ~ ^/(token|admin|strategies|portfolios|me|licenses|api) {
        proxy_pass         https://mirrorserver.trademetric.com.br;
        proxy_set_header   Host mirrorserver.trademetric.com.br;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # --- Reverse Proxy: WebSocket ---
    location /ws {
        proxy_pass         https://mirrorserver.trademetric.com.br;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host mirrorserver.trademetric.com.br;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # --- SPA Routing ---
    # All routes that are not files/API are served by React Router (index.html)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
